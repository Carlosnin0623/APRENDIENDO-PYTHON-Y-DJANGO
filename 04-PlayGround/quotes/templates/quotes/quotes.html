{% extends "base.html" %}
 
{% block title %}
Pagina de Citas
{% endblock title %}


{% block content %}
   <h1>Estos son los días de la semana: </h1>
    <ul>
      {% for dias in days %}
        <li><a href="{% url 'day-quote' dias.id %}">{{dias.id}}</a></li>
      {% empty %}
        <li>Lo siento, no hay elementos para mostrar.</li>
      {% endfor %}
    </ul>
{% endblock %}
